spring.application.name=study-session

# H2 for local dev
spring.datasource.url=jdbc:h2:mem:studysession
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Storage (MinIO local / overridden by env in Docker)
storage.endpoint=${STORAGE_ENDPOINT:http://localhost:9000}
storage.access-key=${STORAGE_ACCESS_KEY:minioadmin}
storage.secret-key=${STORAGE_SECRET_KEY:minioadmin}
storage.bucket=${STORAGE_BUCKET:study-session}
storage.region=${STORAGE_REGION:us-east-1}

# Gemini API configuration
gemini.api-key=${GEMINI_API_KEY:}
